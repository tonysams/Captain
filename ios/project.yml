name: InstructorBuddy
options:
  bundleIdPrefix: com.instructorbuddy
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

targets:
  InstructorBuddy:
    type: application
    platform: iOS
    sources:
      - path: InstructorBuddy
    info:
      path: InstructorBuddy/Config/Info.plist
      properties:
        CFBundleName: Instructor Buddy
        CFBundleDisplayName: Instructor Buddy
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "Instructor Buddy needs camera access to record skiing sessions."
        NSMicrophoneUsageDescription: "Instructor Buddy records audio with video for coaching context."
        NSPhotoLibraryUsageDescription: "Instructor Buddy can analyze videos from your photo library."
        UILaunchScreen:
          UIColorName: "AccentColor"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        InstructorBuddyAPIURL: "$(INSTRUCTOR_BUDDY_API_URL)"
        SupabaseURL: "$(SUPABASE_URL)"
        SupabaseAnonKey: "$(SUPABASE_ANON_KEY)"
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.instructorbuddy.app
        PRODUCT_NAME: InstructorBuddy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INSTRUCTOR_BUDDY_API_URL: "http://localhost:3000"
        SUPABASE_URL: ""
        SUPABASE_ANON_KEY: ""
